<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Digital — Catálogo de Tecnología y Ciberseguridad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-deep:#101724;
    --ink-panel:#161f30;
    --ink-line: rgba(237,231,218,0.12);
    --paper:#efe7d6;
    --paper-shadow:#d8cdb2;
    --text-dark:#241f16;
    --text-light:#ece5d6;
    --text-muted:#a9a190;
    --brass:#c79a3c;
    --brass-bright:#e2b654;
    --teal:#4a9793;
    --stamp-red:#8a3b3b;
    --radius-card: 3px;
    --font-display:'Special Elite', 'Courier New', monospace;
    --font-body:'Source Sans 3', 'Segoe UI', sans-serif;
    --font-mono:'IBM Plex Mono', 'Courier New', monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    background:
      radial-gradient(circle at 15% 8%, rgba(74,151,147,0.10), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(199,154,60,0.08), transparent 45%),
      var(--ink-deep);
    color:var(--text-light);
    font-family:var(--font-body);
    min-height:100vh;
    background-attachment:fixed;
  }

  /* faint circuit / grid texture on dark background */
  .grain-overlay{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(var(--ink-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--ink-line) 1px, transparent 1px);
    background-size: 42px 42px;
    opacity:0.35;
    mask-image: radial-gradient(circle at 50% 0%, black, transparent 75%);
  }

  header.top{
    position:relative; z-index:1;
    padding: 48px 6vw 28px;
    border-bottom:1px solid var(--ink-line);
    background:linear-gradient(180deg, var(--ink-panel), rgba(22,31,48,0.4));
  }

  .eyebrow{
    font-family:var(--font-mono);
    letter-spacing:.28em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--brass-bright);
    display:flex; align-items:center; gap:10px;
    margin-bottom:14px;
  }
  .eyebrow::before{
    content:"";
    width:26px; height:1px; background:var(--brass-bright); opacity:.7;
  }

  h1.title{
    font-family:var(--font-display);
    font-weight:400;
    font-size:clamp(32px, 5vw, 54px);
    line-height:1.05;
    margin:0 0 10px;
    color:var(--text-light);
    letter-spacing:0.5px;
  }
  h1.title .accent{ color:var(--teal); }

  .subtitle{
    max-width:620px;
    color:var(--text-muted);
    font-size:15.5px;
    line-height:1.55;
    margin:0 0 26px;
  }

  .stats-row{
    display:flex; flex-wrap:wrap; gap:10px 28px;
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--text-muted);
    margin-bottom:6px;
  }
  .stats-row b{ color:var(--brass-bright); font-weight:600; }

  /* control panel */
  .controls{
    position:sticky; top:0; z-index:5;
    background:rgba(16,23,36,0.94);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--ink-line);
    padding:16px 6vw;
    display:flex; flex-wrap:wrap; gap:14px 18px; align-items:center;
  }

  .search-wrap{
    position:relative;
    flex:1 1 280px;
    min-width:220px;
  }
  .search-wrap label{
    position:absolute; left:14px; top:-9px;
    font-family:var(--font-mono);
    font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    background:var(--ink-deep);
    padding:0 6px;
    color:var(--brass-bright);
  }
  .search-wrap input[type="text"]{
    width:100%;
    background:var(--paper);
    color:var(--text-dark);
    border:1px solid var(--paper-shadow);
    border-radius:2px;
    padding:12px 14px;
    font-family:var(--font-mono);
    font-size:14px;
    outline:none;
  }
  .search-wrap input[type="text"]:focus{
    border-color:var(--teal);
    box-shadow:0 0 0 3px rgba(74,151,147,0.25);
  }

  select#sortSelect{
    background:var(--paper);
    color:var(--text-dark);
    border:1px solid var(--paper-shadow);
    border-radius:2px;
    padding:12px 12px;
    font-family:var(--font-mono);
    font-size:13px;
    outline:none;
    cursor:pointer;
  }

  .clear-btn{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-muted);
    background:transparent;
    border:1px solid var(--ink-line);
    padding:11px 14px;
    border-radius:2px;
    cursor:pointer;
    letter-spacing:.05em;
  }
  .clear-btn:hover{ color:var(--text-light); border-color:var(--brass); }

  .chips-row{
    padding:16px 6vw 0;
    display:flex; flex-wrap:wrap; gap:8px;
    position:relative; z-index:1;
  }
  .chip{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-muted);
    border:1px solid var(--ink-line);
    background:rgba(237,231,218,0.03);
    padding:7px 12px;
    border-radius:20px;
    cursor:pointer;
    user-select:none;
    transition:border-color .15s, color .15s, background .15s;
    white-space:nowrap;
  }
  .chip:hover{ border-color:var(--teal); color:var(--text-light); }
  .chip.active{
    background:var(--brass);
    border-color:var(--brass);
    color:#1a1305;
    font-weight:600;
  }

  main{
    position:relative; z-index:1;
    padding:30px 6vw 90px;
  }

  #resultsMeta{
    font-family:var(--font-mono);
    font-size:12.5px;
    color:var(--text-muted);
    margin-bottom:18px;
    letter-spacing:.02em;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
    gap:22px;
  }

  /* === Index card === */
  .card{
    position:relative;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.02), transparent 40px),
      var(--paper);
    color:var(--text-dark);
    border-radius:var(--radius-card);
    padding:20px 18px 16px;
    box-shadow:0 10px 22px -12px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.04) inset;
    border:1px solid var(--paper-shadow);
    display:flex;
    flex-direction:column;
    min-height:100%;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .card::before{
    /* ruled line under header, like an index card */
    content:"";
    position:absolute; left:18px; right:18px; top:64px;
    height:1px;
    background:repeating-linear-gradient(90deg, var(--paper-shadow) 0 6px, transparent 6px 10px);
  }
  .card:hover{
    transform:translateY(-3px) rotate(-0.3deg);
    box-shadow:0 16px 30px -14px rgba(0,0,0,0.6);
  }
  @media (prefers-reduced-motion: reduce){
    .card{ transition:none; }
    .card:hover{ transform:none; }
  }

  .card-top{
    display:flex; justify-content:space-between; align-items:flex-start;
    gap:10px;
    margin-bottom:14px;
  }

  .call-number{
    font-family:var(--font-mono);
    font-size:11px;
    font-weight:600;
    color:var(--brass);
    border:1.5px solid var(--brass);
    border-radius:3px;
    padding:3px 7px;
    transform:rotate(-3deg);
    display:inline-block;
    letter-spacing:.03em;
    white-space:nowrap;
  }

  .catalog-index{
    font-family:var(--font-mono);
    font-size:10.5px;
    color:var(--paper-shadow);
    text-align:right;
    line-height:1.3;
  }

  h3.book-title{
    font-family:var(--font-body);
    font-weight:700;
    font-size:16.5px;
    line-height:1.32;
    margin:0 0 8px;
    color:var(--text-dark);
  }

  .book-authors{
    font-size:13px;
    font-style:italic;
    color:#4a4536;
    line-height:1.4;
    margin:0 0 12px;
  }

  .meta-line{
    font-family:var(--font-mono);
    font-size:11.5px;
    color:#5a5240;
    display:flex; flex-wrap:wrap; gap:6px 10px;
    margin-bottom:14px;
  }
  .meta-line span{ white-space:nowrap; }
  .meta-line .dot{ opacity:.5; }

  .tema-tag{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--font-mono);
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:var(--teal);
    margin-bottom:14px;
  }
  .tema-tag .swatch{
    width:8px; height:8px; border-radius:50%;
    background:var(--teal);
  }

  .card-actions{
    margin-top:auto;
    display:flex; gap:8px; flex-wrap:wrap;
    padding-top:12px;
    border-top:1px dashed var(--paper-shadow);
  }

  .btn{
    font-family:var(--font-mono);
    font-size:11.5px;
    padding:8px 11px;
    border-radius:2px;
    cursor:pointer;
    text-decoration:none;
    letter-spacing:.02em;
    border:1px solid var(--text-dark);
    color:var(--text-dark);
    background:transparent;
    transition:background .15s,color .15s;
  }
  .btn:hover{ background:var(--text-dark); color:var(--paper); }
  .btn.primary{
    background:var(--teal);
    border-color:var(--teal);
    color:#0d1f1e;
    font-weight:600;
  }
  .btn.primary:hover{ background:#3d827e; }
  .btn.disabled{
    opacity:.4; cursor:not-allowed; pointer-events:none;
  }

  .reference-box{
    display:none;
    margin-top:12px;
    background:rgba(36,31,22,0.05);
    border-left:2px solid var(--brass);
    padding:10px 12px;
    font-family:var(--font-mono);
    font-size:11px;
    line-height:1.55;
    color:#3a3527;
  }
  .reference-box.open{ display:block; }

  .cover-thumb{
    float:right;
    width:52px; height:72px;
    object-fit:cover;
    margin:0 0 8px 10px;
    border:1px solid var(--paper-shadow);
    box-shadow:0 3px 8px rgba(0,0,0,0.25);
  }

  .empty-state{
    text-align:center;
    padding:80px 20px;
    color:var(--text-muted);
    font-family:var(--font-mono);
  }
  .empty-state .glyph{
    font-family:var(--font-display);
    font-size:44px;
    color:var(--brass);
    margin-bottom:14px;
  }

  footer.foot{
    border-top:1px solid var(--ink-line);
    padding:26px 6vw 40px;
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--text-muted);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
    position:relative; z-index:1;
  }

  ::selection{ background:var(--brass); color:#1a1305; }

  @media (max-width:640px){
    header.top{ padding:36px 5vw 24px; }
    .controls, .chips-row, main, footer.foot{ padding-left:5vw; padding-right:5vw; }
  }
</style>
</head>
<body>
<div class="grain-overlay"></div>

<header class="top">
  <div class="eyebrow">Catálogo &amp; ficha técnica</div>
  <h1 class="title">Biblioteca <span class="accent">Digital</span></h1>
  <p class="subtitle">Fondo bibliográfico de tecnología, redes y ciberseguridad. Busca por título, autor o editorial, filtra por tema y abre el enlace de cada volumen para consultarlo.</p>
  <div class="stats-row" id="statsRow"></div>
</header>

<div class="controls">
  <div class="search-wrap">
    <label for="searchInput">Buscar</label>
    <input type="text" id="searchInput" placeholder="Título, autor, editorial…" autocomplete="off">
  </div>
  <select id="sortSelect">
    <option value="titulo-asc">Título A–Z</option>
    <option value="titulo-desc">Título Z–A</option>
    <option value="anio-desc">Año, más reciente</option>
    <option value="anio-asc">Año, más antiguo</option>
    <option value="autor-asc">Autor A–Z</option>
  </select>
  <button class="clear-btn" id="clearBtn">Limpiar filtros</button>
</div>

<div class="chips-row" id="chipsRow"></div>

<main>
  <div id="resultsMeta"></div>
  <div class="grid" id="grid"></div>
</main>

<footer class="foot">
  <span>Biblioteca digital generada a partir del catálogo original.</span>
  <span id="footStats"></span>
</footer>

  var years = DATA.map(function(r){return r._year;}).filter(function(y){return y!==null;});
  var minYear = Math.min.apply(null, years);
  var maxYear = Math.max.apply(null, years);

  document.getElementById('statsRow').innerHTML =
    '<span><b>'+DATA.length+'</b> volúmenes</span>' +
    '<span><b>'+temaList.length+'</b> áreas temáticas</span>' +
    '<span><b>'+minYear+'–'+maxYear+'</b> rango de publicación</span>';

  var chipsRow = document.getElementById('chipsRow');
  temaList.forEach(function(tema){
    var chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.tema = tema;
    chip.textContent = tema + ' (' + temaCounts[tema] + ')';
    chip.addEventListener('click', function(){
      if(state.temas.has(tema)){
        state.temas.delete(tema);
        chip.classList.remove('active');
      } else {
        state.temas.add(tema);
        chip.classList.add('active');
      }
      render();
    });
    chipsRow.appendChild(chip);
  });

  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function cardHTML(r){
    var hasLink = !!r.enlace;
    var cover = r.portada ? '<img class="cover-thumb" src="'+escapeHtml(r.portada)+'" alt="" loading="lazy" onerror="this.remove()">' : '';
    var edicionYAnio = [r.edicion, r.anio].filter(Boolean).join(' · ');
    return (
      '<article class="card" data-id="'+r._idx+'">'+
        '<div class="card-top">'+
          '<span class="call-number">'+r._call+'</span>'+
          '<span class="catalog-index">FICHA N.º '+String(r._idx+1).padStart(3,'0')+'</span>'+
        '</div>'+
        cover +
        '<h3 class="book-title">'+escapeHtml(r.titulo)+'</h3>'+
        (r.autores ? '<p class="book-authors">'+escapeHtml(r.autores)+'</p>' : '') +
        '<div class="meta-line">'+
          (r.editorial ? '<span>'+escapeHtml(r.editorial)+'</span>' : '') +
          (edicionYAnio ? '<span class="dot">·</span><span>'+escapeHtml(edicionYAnio)+'</span>' : '') +
        '</div>'+
        '<div class="tema-tag"><span class="swatch"></span>'+escapeHtml(r.tema)+'</div>'+
        '<div class="card-actions">'+
          '<button class="btn ref-toggle">Ver referencia APA</button>'+
          (hasLink ? '<a class="btn primary" href="'+escapeHtml(r.enlace)+'" target="_blank" rel="noopener">Abrir enlace ↗</a>' : '<span class="btn disabled">Sin enlace</span>') +
        '</div>'+
        '<div class="reference-box">'+escapeHtml(r.referencia)+'</div>'+
      '</article>'
    );
  }

  function sortData(list){
    var s = state.sort;
    var copy = list.slice();
    copy.sort(function(a,b){
      if(s==='titulo-asc') return a.titulo.localeCompare(b.titulo,'es');
      if(s==='titulo-desc') return b.titulo.localeCompare(a.titulo,'es');
      if(s==='autor-asc') return (a.autores||'').localeCompare(b.autores||'','es');
      if(s==='anio-desc') return (b._year||0)-(a._year||0);
      if(s==='anio-asc') return (a._year||9999)-(b._year||9999);
      return 0;
    });
    return copy;
  }

  var grid = document.getElementById('grid');
  var resultsMeta = document.getElementById('resultsMeta');
  var footStats = document.getElementById('footStats');

  function render(){
    var q = norm(state.query);
    var filtered = DATA.filter(function(r){
      if(state.temas.size>0 && !state.temas.has(r.tema)) return false;
      if(q && r._hay.indexOf(q)===-1) return false;
      return true;
    });
    filtered = sortData(filtered);

    resultsMeta.textContent = filtered.length + ' resultado' + (filtered.length===1?'':'s') +
      (state.temas.size ? ' · filtrado por ' + Array.from(state.temas).join(', ') : '') +
      (state.query ? ' · búsqueda: "' + state.query + '"' : '');

    footStats.textContent = 'Mostrando ' + filtered.length + ' de ' + DATA.length + ' registros';

    if(filtered.length===0){
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">'+
        '<div class="glyph">Ø</div>'+
        'No hay fichas que coincidan con tu búsqueda.'+
      '</div>';
      return;
    }

    grid.innerHTML = filtered.map(cardHTML).join('');
  }

  grid.addEventListener('click', function(e){
    var btn = e.target.closest('.ref-toggle');
    if(!btn) return;
    var box = btn.closest('.card').querySelector('.reference-box');
    box.classList.toggle('open');
    btn.textContent = box.classList.contains('open') ? 'Ocultar referencia' : 'Ver referencia APA';
  });

  var searchInput = document.getElementById('searchInput');
  var debounceTimer;
  searchInput.addEventListener('input', function(){
    clearTimeout(debounceTimer);
    var val = searchInput.value;
    debounceTimer = setTimeout(function(){
      state.query = val;
      render();
    }, 120);
  });

  document.getElementById('sortSelect').addEventListener('change', function(e){
    state.sort = e.target.value;
    render();
  });

  document.getElementById('clearBtn').addEventListener('click', function(){
    state.query='';
    state.temas.clear();
    searchInput.value='';
    document.getElementById('sortSelect').value='titulo-asc';
    state.sort='titulo-asc';
    document.querySelectorAll('.chip.active').forEach(function(c){c.classList.remove('active');});
    render();
  });

  render();
})();

</script>
</body>
</html>
